<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Terminal prompt (staging)">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0a0f0c" />
  <rect x="1" y="1" width="30" height="30" rx="6" fill="none" stroke="#332819" stroke-width="1" opacity="0.9" />
  <g filter="url(#glow)" stroke="#ffaa3d" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M9 9 L17 16 L9 23" stroke-width="2.4" />
    <rect x="19" y="24.5" width="8" height="6" rx="1" fill="#ffaa3d" stroke="none" />
  </g>
  <!-- staging badge -->
  <circle cx="26" cy="6" r="5.5" fill="#ffaa3d" />
  <text x="26" y="9.5" text-anchor="middle" font-family="monospace,sans-serif" font-size="6.5" font-weight="bold" fill="#0a0f0c">S</text>
</svg>
